<div class="login-container">
  <h2>Validar Acesso</h2>
  <p class="subtitle">Enviamos um código de 6 dígitos para o seu e-mail.</p>
  
  <div class="form-group">
    <label>Código de Verificação</label>
<input 
  type="text" 
  [(ngModel)]="codigoInput" 
  placeholder="000000" 
  maxlength="6">

<button (click)="validarAcesso()">LIBERAR MINHA VAGA</button>
</div>
